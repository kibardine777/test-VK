<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover">
    <title>Конструктор заявок 2.3</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --vk-blue: #0077FF; --bg-gray: #EBEDF0; --text-main: #000; --text-soft: #818C99; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-gray); margin: 0; padding: 15px; display: flex; justify-content: center; color: var(--text-main); }
        .container { background: #fff; padding: 24px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 450px; width: 100%; box-sizing: border-box; text-align: center; }
        .hidden { display: none; }
        img.banner { width: 100%; height: auto; min-height: 100px; max-height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 16px; background: #f0f0f0; display: block; }
        h2 { margin: 0 0 8px; font-size: 20px; text-align: left; }
        p.desc { color: var(--text-soft); font-size: 14px; margin-bottom: 20px; line-height: 1.4; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #444; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #DCE1E6; box-sizing: border-box; font-size: 15px; background: #F2F3F5; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-main { background: var(--vk-blue); color: #fff; }
        .btn-add { background: #E1E3E6; color: #444; margin-bottom: 15px; font-size: 14px; }
        .btn-del { background: #FF3B30; color: #fff; width: auto; padding: 6px 12px; font-size: 11px; border-radius: 6px; }
        .field-editor { background: #F5F6F7; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #E1E3E6; text-align: left; }
        .privacy { font-size: 12px; color: var(--text-soft); margin-top: 15px; }
        .privacy a { color: var(--vk-blue); text-decoration: none; }
        .admin-trigger { background: none; color: #DCE1E6; font-size: 10px; margin-top: 30px; border: none; cursor: pointer; width: auto; padding: 5px; }
        #loading { margin-top: 50px; text-align: center; color: var(--text-soft); }
    </style>
</head>
<body>

<div id="loading">Загрузка системы...</div>

<div id="userView" class="container hidden">
    <img id="userBanner" class="banner" src="" alt="">
    <h2 id="userTitle"></h2>
    <p id="userSubtitle" class="desc"></p>
    <form id="clientForm"></form>
    <div id="userPrivacy" class="privacy"></div>
    <button class="admin-trigger" onclick="manualAdminLogin()">v2.3</button>
</div>

<div id="adminView" class="container hidden">
    <h2>⚙️ Настройка проекта</h2>
    <label>Название сообщества (для почты):</label>
    <input type="text" id="editProjectName" placeholder="Например: СантехФитингКомплект">
    <label>Заголовок формы:</label>
    <input type="text" id="editTitle">
    <label>Подзаголовок:</label>
    <textarea id="editSubtitle"></textarea>
    <label>Файл обложки:</label>
    <input type="text" id="editImage">
    <label>Web3Forms Key:</label>
    <input type="text" id="editKey">
    <label>Ссылка на политику:</label>
    <input type="text" id="editPrivacy">
    <h3 style="font-size: 16px; text-align: left; margin-top: 20px;">Поля анкеты:</h3>
    <div id="fieldsList"></div>
    <button class="btn-add" onclick="addField()">+ Добавить поле</button>
    <button class="btn-main" id="saveBtn" onclick="saveSettings()">Сохранить всё</button>
</div>

<script>
    const SUPABASE_URL = 'https://dhtcpgyeygiafwngxyoc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_neIIsf1I3lvQ1vvmll4pEg_IwesIUo9';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    vkBridge.send('VKWebAppInit');

    const params = new URLSearchParams(window.location.search);
    let gid = params.get('vk_group_id');
    const role = params.get('vk_viewer_role');
    const viewerId = params.get('vk_viewer_id');
    const MY_VK_ID = 52069477;

    let currentFields = [];
    let dbData = null;

    // Вспомогательная функция для перевода кириллицы в латиницу (для почты)
    function translit(text) {
        const map = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'j','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ы':'y','э':'e','ю':'yu','я':'ya',' ':'_'};
        return text.toLowerCase().split('').map(char => map[char] || (/[a-z0-9]/.test(char) ? char : '')).join('').substring(0, 20);
    }

    async function start() {
        if (!gid) {
            document.getElementById('loading').innerHTML = `Запустите из ВК или <button onclick="manualAdminLogin()">Админ</button>`;
            return;
        }
        const { data } = await _supabase.from('forms').select('*').eq('vk_group_id', gid).single();
        dbData = data;
        const isAdmin = (role === 'admin' || role === 'editor' || viewerId == MY_VK_ID);
        if (isAdmin && !dbData) showAdmin(dbData);
        else if (dbData) showUser(dbData);
        else document.getElementById('loading').innerText = "Форма не настроена.";
    }

    function manualAdminLogin() {
        if (prompt("Ваш ID:") == MY_VK_ID) { if(!gid) gid = prompt("ID группы:"); showAdmin(dbData); }
    }

    function showAdmin(data) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('userView').classList.add('hidden');
        document.getElementById('adminView').classList.remove('hidden');
        if (data) {
            document.getElementById('editProjectName').value = data.project_name || '';
            document.getElementById('editTitle').value = data.title || '';
            document.getElementById('editSubtitle').value = data.subtitle || '';
            document.getElementById('editImage').value = data.image_url || '';
            document.getElementById('editKey').value = data.web3forms_key || '';
            document.getElementById('editPrivacy').value = data.privacy_url || '';
            currentFields = data.fields || [];
            renderFieldsEditor();
        }
    }

    function addField() { currentFields.push({ label: 'Ваш вопрос', type: 'text', options: '' }); renderFieldsEditor(); }

    function renderFieldsEditor() {
        const list = document.getElementById('fieldsList'); list.innerHTML = '';
        currentFields.forEach((f, i) => {
            const div = document.createElement('div'); div.className = 'field-editor';
            div.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>Вопрос #${i+1}</b><button class="btn-del" onclick="currentFields.splice(${i},1); renderFieldsEditor()">Удалить</button></div>
                <input type="text" value="${f.label}" oninput="currentFields[${i}].label=this.value" placeholder="Название вопроса">
                <select onchange="currentFields[${i}].type=this.value; renderFieldsEditor()"><option value="text" ${f.type==='text'?'selected':''}>Текст</option><option value="tel" ${f.type==='tel'?'selected':''}>Телефон</option><option value="textarea" ${f.type==='textarea'?'selected':''}>Абзац</option><option value="select" ${f.type==='select'?'selected':''}>Список</option></select>
                ${f.type === 'select' ? `<input type="text" value="${f.options || ''}" oninput="currentFields[${i}].options=this.value" placeholder="Варианты через запятую">` : ''}`;
            list.appendChild(div);
        });
    }

    async function saveSettings() {
        const payload = { vk_group_id: gid, project_name: document.getElementById('editProjectName').value, title: document.getElementById('editTitle').value, subtitle: document.getElementById('editSubtitle').value, image_url: document.getElementById('editImage').value, web3forms_key: document.getElementById('editKey').value, privacy_url: document.getElementById('editPrivacy').value, fields: currentFields };
        await _supabase.from('forms').upsert(payload, { onConflict: 'vk_group_id' });
        alert('Сохранено!'); location.reload();
    }

    function showUser(data) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('userView').classList.remove('hidden');
        if (data.image_url) { document.getElementById('userBanner').src = data.image_url; } else { document.getElementById('userBanner').style.display = 'none'; }
        document.getElementById('userTitle').innerText = data.title;
        document.getElementById('userSubtitle').innerText = data.subtitle;
        const form = document.getElementById('clientForm'); form.innerHTML = '';
        data.fields.forEach((f, index) => {
            const lbl = document.createElement('label'); lbl.innerText = f.label; form.appendChild(lbl);
            let input = f.type === 'select' ? document.createElement('select') : (f.type === 'textarea' ? document.createElement('textarea') : document.createElement('input'));
            if (f.type === 'select') { (f.options || '').split(',').forEach(o => { const opt = document.createElement('option'); opt.value = o.trim(); opt.innerText = o.trim(); input.appendChild(opt); }); }
            else if (f.type !== 'textarea') { input.type = f.type; }
            // Генерируем чистое имя на латинице для почты
            input.name = `Q${index+1}_${translit(f.label)}`; 
            input.required = true; form.appendChild(input);
        });
        if (data.privacy_url) { document.getElementById('userPrivacy').innerHTML = `Нажимая кнопку, вы соглашаетесь с <a href="${data.privacy_url}" target="_blank">политикой конфиденциальности</a>`; }
        const btn = document.createElement('button'); btn.className = 'btn-main'; btn.innerText = 'Отправить'; btn.style.marginTop = '15px'; form.appendChild(btn);
        form.onsubmit = async (e) => {
            e.preventDefault(); btn.disabled = true; btn.innerText = 'Отправка...';
            const formData = new FormData(form);
            formData.append("access_key", data.web3forms_key);
            formData.append("from_name", data.project_name || "Form");
            formData.append("subject", `Заявка: ${data.project_name || 'Новая'}`);
            // Добавляем легенду в конец письма, чтобы знать какой Q что значил
            let legend = "\n\n--- Расшифровка вопросов ---\n";
            data.fields.forEach((f, i) => legend += `Q${i+1}: ${f.label}\n`);
            formData.append("Questions_Legend", legend);
            await fetch("https://api.web3forms.com/submit", { method: "POST", body: formData });
            alert('Заявка отправлена!'); vkBridge.send("VKWebAppClose", {"status": "success"});
        };
    }
    start();
</script>
</body>
</html>
